<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Maldita Dulzura – Pasteles Rebeldes</title>
  <meta name="description" content="Contáctanos para pedidos personalizados, consultas o simplemente para decirnos cuánto te tentamos. Responderemos rapidito.">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Fuentes personalizadas -->
  <link href="https://fonts.googleapis.com/css2?family=Englebert&family=Twinkle+Star&display=swap" rel="stylesheet">

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="style/style.css">


</head>
<body class="bg-[#fffbf7] min-h-screen flex flex-col">
  <div id="globalModal"></div>
  <header id="navbar"></header>

  <main class="flex-1">
    <section id="nuestrosproductos"></section>

  </main>


  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- Scripts -->
  <script src="js/main.js"></script>         <!-- Menú móvil -->
  <script src="js/router.js"></script>       <!-- Carga navbar y footer -->

  <script>
    document.body.classList.add('opacity-0');
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.body.classList.remove('opacity-0');
        document.body.classList.add('opacity-100', 'transition-opacity', 'duration-700');
      }, 100);
    });
  </script>
</body>
</html>
